# ---------------------------------------------------------------------------
# SGO — Sistema de Gestão Operacional | Altrs
# Chassi Docker Swarm + Traefik (1 stack = 1 Postgres + 1 chassi)
# https://github.com/altrsconsult/sgo  |  MIT
# ---------------------------------------------------------------------------
#
# Alternativa: Postgres compartilhado — stack-postgres-shared.yml + stack-chassi-only.yml
# Ver deploy/stack-env.example.txt e docs/guides/DEPLOY.md.
#
# Pré-requisitos: rede overlay do cliente; Traefik na mesma rede.
# Rede: se não for altrs_net, use Localizar e Substituir (altrs_net → nome_da_rede_do_cliente).
# Sem placement constraint (roda em qualquer nó). Imagens em :latest; para versão específica use Localizar e Substituir (latest → v4.0.5).
# Portainer: Stacks → Add stack → colar YAML e preencher variáveis (stack-env.example.txt).

services:
  chassi-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${SGO_POSTGRES_DB:-sgo}
      POSTGRES_USER: ${SGO_POSTGRES_USER:-sgo}
      POSTGRES_PASSWORD: ${SGO_POSTGRES_PASSWORD}
      TZ: ${SGO_TZ:-UTC}
    networks:
      - altrs_net
    volumes:
      - chassi-db-data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "1"
          memory: 1024M

  chassi-backend:
    image: ghcr.io/altrsconsult/chassi-backend:latest
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${SGO_POSTGRES_USER:-sgo}:${SGO_POSTGRES_PASSWORD}@chassi-db:5432/${SGO_POSTGRES_DB:-sgo}
      JWT_SECRET: ${SGO_JWT_SECRET}
      NEXUS_URL: ${SGO_NEXUS_URL:-}
      CHASSIS_URL: https://${SGO_DOMAIN}
      DOCKER_ENV: "true"
    volumes:
      - chassi-modules:/app/modules_storage
      - chassi-uploads:/app/uploads
    networks:
      - altrs_net
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  chassi-frontend:
    image: ghcr.io/altrsconsult/chassi-frontend:latest
    networks:
      - altrs_net
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        # Router/service sgo-eduka (Localizar e Substituir se stack tiver outro nome)
        - traefik.enable=true
        - traefik.http.routers.sgo-eduka.rule=Host(`${SGO_DOMAIN}`)
        - traefik.http.services.sgo-eduka.loadbalancer.server.port=80
        - traefik.http.routers.sgo-eduka.service=sgo-eduka
        - traefik.http.routers.sgo-eduka.tls.certresolver=${SGO_TLS_RESOLVER:-letsencryptresolver}
        - traefik.http.routers.sgo-eduka.entrypoints=websecure
        - traefik.http.routers.sgo-eduka.tls=true
        # HTTP -> HTTPS redirect
        - traefik.http.routers.sgo-eduka-http.rule=Host(`${SGO_DOMAIN}`)
        - traefik.http.routers.sgo-eduka-http.entrypoints=web
        - traefik.http.routers.sgo-eduka-http.middlewares=sgo-eduka-redirect
        - traefik.http.middlewares.sgo-eduka-redirect.redirectscheme.scheme=https

networks:
  # Nome da rede do cliente (Localizar e Substituir se não for altrs_net)
  altrs_net:
    external: true

volumes:
  chassi-db-data:
    driver: local
  chassi-modules:
    driver: local
  chassi-uploads:
    driver: local
