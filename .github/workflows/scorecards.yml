# OSSF Scorecard — análise de segurança do repositório
# https://github.com/marketplace/actions/ossf-scorecard-action
# Badge e resultados: publish_results: true atualiza api.scorecard.dev e o badge no README
name: Scorecard analysis

on:
  schedule:
    # Mensal (dia 1 às 02:00 UTC)
    - cron: '0 2 1 * *'
  workflow_dispatch:  # permite rodar manualmente no GitHub Actions

permissions: read-all

jobs:
  analysis:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact (SARIF)
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
